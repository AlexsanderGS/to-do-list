<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./src/styles/main.css" />

    <link
      rel="shortcut icon"
      href="./src/assets/images/favicon.ico"
      type="image/x-icon"
    />

    <title>Lista de Tarefas Online</title>
  </head>
  <body>
    <main class="main-content">
      <header class="header-content">
        <img
          class="header-icon"
          src="./src/assets/icons/task.svg"
          alt="ícone de lista de tarefas"
        />
        <div class="header-info">
          <h1 class="header-title">Lista de Tarefas</h1>
          <p class="header-text">Organize seu dia! ✨</p>
        </div>
      </header>

      <section class="add-task">
        <form class="add-task-form">
          <input
            type="text"
            name="task"
            id="task-name"
            placeholder="O que você precisa fazer?"
          />

          <div class="add-task-actions">
            <button class="calendar-button" type="button">
              <img
                class="calendar-icon"
                src="./src/assets/icons/calendar.svg"
                alt=""
              />
              Selecionar dia
            </button>

            <button class="add-task-button" type="submit">
              <img src="./src/assets/icons/plus.svg" alt="" />
              Adicionar tarefa
            </button>
          </div>
        </form>
      </section>

      <section class="task-filter">
        <div class="filter-options">
          <button class="all-tasks active" type="button">
            <img
              class="all-tasks-icon"
              src="./src/assets/icons/list.svg"
              alt=""
            />
            Todas
          </button>
          <button class="pending-tasks" type="button">
            <img
              class="pending-icon"
              src="./src/assets/icons/clock.svg"
              alt=""
            />
            Pendentes
          </button>
          <button class="completed-tasks" type="button">
            <img
              class="complete-icon"
              src="./src/assets/icons/check.svg"
              alt=""
            />
            Concluídas
          </button>
        </div>
      </section>

      <div class="clear-tasks">
        <button class="clear-tasks-button" type="button">
          <img class="clear-icon" src="./src/assets/icons/trash.svg" alt="" />
          Limpar tarefas
        </button>
      </div>

      <section class="tasks-list">
        <ul>
          <li class="task-item">
            <div class="task-content">
              <input type="checkbox" name="checkbox" />

              <div class="task-info">
                <span class="task-text">Estudar React Hooks</span>
                <div class="task-meta">
                  <img src="./src/assets/icons/calendar.svg" alt="" />
                  <span class="task-date">24/04</span>
                </div>
              </div>
            </div>

            <div class="list-actions">
              <button
                class="edit-task"
                type="button"
                aria-label="Editar Tarefa"
              >
                <img
                  class="edit-icon"
                  src="./src/assets/icons/edit.svg"
                  alt=""
                />
              </button>

              <button
                class="delete-task"
                type="button"
                aria-label="Excluir tarefa"
              >
                <img
                  class="delete-icon"
                  src="./src/assets/icons/trash.svg"
                  alt=""
                />
              </button>
            </div>
          </li>

          <li class="task-item">
            <div class="task-content">
              <input type="checkbox" name="checkbox" />

              <div class="task-info">
                <span class="task-text">Estudar TypeScript</span>
                <div class="task-meta">
                  <img src="./src/assets/icons/calendar.svg" alt="" />
                  <span class="task-date">24/04</span>
                </div>
              </div>
            </div>

            <div class="list-actions">
              <button
                class="edit-task"
                type="button"
                aria-label="Editar Tarefa"
              >
                <img
                  class="edit-icon"
                  src="./src/assets/icons/edit.svg"
                  alt=""
                />
              </button>

              <button
                class="delete-task"
                type="button"
                aria-label="Excluir tarefa"
              >
                <img
                  class="delete-icon"
                  src="./src/assets/icons/trash.svg"
                  alt=""
                />
              </button>
            </div>
          </li>
        </ul>
      </section>

      <footer class="footer">
        <img
          class="lightbulb-icon"
          src="./src/assets/icons/lightbulb.svg"
          alt=""
        />
        <p class="tip-text">
          <span
            ><strong>Dica: </strong>Clique em uma tarefa para marcá-la como
            concluída.</span
          >
          <span>Use o ícone de edição para alterar os detalhes.</span>
        </p>
      </footer>
    </main>
  </body>
</html>
